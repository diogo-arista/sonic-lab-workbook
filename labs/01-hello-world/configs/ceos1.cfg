! ceos1 startup configuration
! Lab: 01-hello-world
!
hostname ceos1
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
!
management api http-commands
   no shutdown
   !
   vrf default
      no shutdown
!
! Point-to-point link towards sonic1
interface Ethernet1
   no switchport
   ip address 192.168.1.1/30
!
ip routing
!
end
