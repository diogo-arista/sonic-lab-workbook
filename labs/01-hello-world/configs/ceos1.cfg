! ceos1 startup configuration
! Lab: 01-hello-world
!
hostname ceos1
!
no aaa root
!
! Local user — used for SSH and eAPI access.
! Credentials: admin / admin
username admin privilege 15 role network-admin secret admin
!
! Use local username/password for SSH login
aaa authentication login default local
aaa authorization exec default local
!
! Enable SSH on the default VRF
management ssh
   no shutdown
   !
   vrf default
      no shutdown
!
! Enable eAPI (HTTP) for automation
management api http-commands
   no shutdown
   !
   vrf default
      no shutdown
!
! Point-to-point link towards sonic1
interface Ethernet1
   no switchport
   ip address 192.168.1.1/30
!
ip routing
!
end
