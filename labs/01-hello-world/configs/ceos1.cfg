! ceos1 startup configuration
! Lab: 01-hello-world
!
hostname ceos1
!
aaa root nopassword
!
username admin privilege 15 role network-admin nopassword
!
aaa authentication policy local allow-nopassword-remote-login
aaa authorization exec default local
aaa authorization commands all default local
!
! Enable SSH on the default VRF
management ssh
   no shutdown
   !
   vrf default
      no shutdown
!
! Enable eAPI (HTTP) for automation
management api http-commands
   no shutdown
   !
   vrf default
      no shutdown
!
! Point-to-point link towards sonic1
interface Ethernet1
   no switchport
   ip address 192.168.1.1/30
!
ip routing
!
end
