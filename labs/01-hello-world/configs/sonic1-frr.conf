! sonic1 FRR configuration
! Lab: 01-hello-world
!
! docker_routing_config_mode = split-unified
! FRR is managed here directly — SONiC will NOT auto-generate this file from ConfigDB.
! For this lab (basic connectivity only), no routing protocols are configured.
! Add BGP/EVPN blocks here in future labs.
!
frr defaults datacenter
hostname sonic1
log syslog informational
no zebra nexthop kernel enable
fpm address 127.0.0.1
!
end
