name: 01-hello-world

# Empty prefix means container names are just the node names: ceos1, sonic1.
# Without this, names would be clab-01-hello-world-ceos1, etc.
prefix: ""

# Management network shared across all nodes.
# Static mgmt-ipv4 per node makes SSH and scripting predictable.
mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:

    # -----------------------------------------------------------------------
    # Arista cEOS-lab
    # -----------------------------------------------------------------------
    # Image tag must match what you imported:
    #   docker import cEOS-lab-4.35.3F.tar.xz ceos:latest
    # On Apple Silicon, prefer the ARM64 cEOS build (native, no emulation).
    ceos1:
      kind: arista_ceos
      image: ceos:latest
      mgmt-ipv4: 172.20.20.11
      group: router
      startup-config: configs/ceos1.cfg

    # -----------------------------------------------------------------------
    # SONiC Virtual Machine (via vrnetlab)
    # -----------------------------------------------------------------------
    # Image is built with:  bash scripts/build-sonic-vm.sh
    # The script downloads sonic-vs.img.gz, wraps it with vrnetlab, and
    # produces vrnetlab/vr-sonic:latest.
    #
    # Requires /dev/kvm (nested virtualization):
    #   - GitHub Codespaces (privileged):  supported
    #   - Linux host:                      supported
    #   - macOS Docker Desktop:            NOT supported
    #
    # Interface mapping (same as sonic-vs):
    #   eth0  → management (containerlab mgmt network)
    #   eth1  → Ethernet0  (first data port)
    #   eth2  → Ethernet4  (second data port, +4 lanes per port)
    #
    # Default credentials: admin / admin
    sonic1:
      kind: sonic-vm
      image: vrnetlab/vr-sonic:latest
      mgmt-ipv4: 172.20.20.12
      group: router
      startup-config: configs/sonic1-config.json

  links:
    # Single point-to-point link.
    #   ceos1  Ethernet1       <-->  sonic1 Ethernet0
    #   (containerlab eth1)         (containerlab eth1)
    - endpoints: ["ceos1:eth1", "sonic1:eth1"]
